                -var="max_nodes=3" \
                -var="cost_alert_threshold=100" \
                -input=false \
                -no-color \
                -out=computeplan \
                -detailed-exitcode 2>&1 | tee plan_output.log
              
              local exit_code=${PIPESTATUS[0]}
              set -e  # Re-enable exit on error
              
              case $exit_code in
                0)
                  echo '✅ Plan successful - no changes needed'
                  return 0
                  ;;
                2)
                  echo '✅ Plan successful - changes detected'
                  return 0
                  ;;
                1)
                  # Check if it's a lock error specifically
                  if grep -q 'Error acquiring the state lock' plan_output.log; then
                    echo '🔒 State lock error detected on attempt $attempt'
                    if [ $attempt -lt $max_attempts ]; then
                      echo '🔄 Will retry with longer wait...'
                      continue
                    else
                      echo '💥 State lock persists after $max_attempts attempts'
                      echo '📋 Lock troubleshooting info:'
                      echo '1. Check if another deployment is running'
                      echo '2. Verify DynamoDB table: etriage-tfstate-lock'
                      echo '3. Manual unlock may be required'
                      return 1
                    fi
                  else
                    echo '❌ Plan failed with non-lock error:'
                    cat plan_output.log
                    return 1
                  fi
                  ;;
                *)
                  echo '❓ Unexpected terraform exit code: $exit_code'
                  cat plan_output.log
                  return 1
                  ;;
              esac
            done
            
            echo '💥 All retry attempts exhausted'
            return 1
          }

          # Execute the plan with retry
          if terraform_plan_with_retry; then
            echo '🎉 Terraform planning completed successfully!'
          else
            echo '💥 Terraform planning failed after all retry attempts'
            exit 1
          fi
        working-directory: ./terraform
      - name: 📊 Plan Analysis & Validation
        run: |-
          echo '📊 Analyzing terraform plan for cost and security...'

          # Validate the plan exists and is readable
          if [ ! -f computeplan ]; then
            echo '❌ Plan file not found'
            exit 1
          fi

          # Display plan summary
          terraform show -no-color computeplan | head -50
          echo '...'

          # Cost estimation (if available)
          if command -v infracost >/dev/null 2>&1; then
            echo '💰 Generating cost estimate...'
            infracost breakdown --path . --format table || echo 'Cost estimation unavailable'
          fi
        working-directory: ./terraform
      - name: 🚀 Terraform Apply with Enhanced Monitoring
        run: |-
          echo '🚀 Applying infrastructure changes with monitoring...'

          # Apply with comprehensive logging
          terraform apply \
            -auto-approve \
            -input=false \
            -no-color \
            computeplan 2>&1 | tee apply_output.log

          # Extract deployment metrics
          RESOURCES_ADDED=$(grep -c 'will be created' apply_output.log || echo '0')
          RESOURCES_CHANGED=$(grep -c 'will be updated' apply_output.log || echo '0')
          RESOURCES_DESTROYED=$(grep -c 'will be destroyed' apply_output.log || echo '0')

          echo '📊 Deployment Summary:'
          echo "  📦 Resources Added: $RESOURCES_ADDED"
          echo "  🔄 Resources Modified: $RESOURCES_CHANGED"
          echo "  🗑️  Resources Removed: $RESOURCES_DESTROYED"

          # Export for downstream jobs
          echo "RESOURCES_ADDED=$RESOURCES_ADDED" >> $GITHUB_ENV
          echo "RESOURCES_CHANGED=$RESOURCES_CHANGED" >> $GITHUB_ENV
          echo "RESOURCES_DESTROYED=$RESOURCES_DESTROYED" >> $GITHUB_ENV
        working-directory: ./terraform
      - name: ✅ Infrastructure Verification
        run: |-
          echo '🔍 Verifying infrastructure deployment...'

          # Verify terraform state
          terraform refresh -input=false

          # Validate outputs
          terraform output -json > outputs.json
          if [ -s outputs.json ] && [ "$(cat outputs.json)" != '{}' ]; then
            echo '✅ Infrastructure outputs available:'
            cat outputs.json | jq .
          else
            echo '⚠️  No infrastructure outputs (may be expected)'
          fi

          # Health check placeholder
          echo '🏥 Infrastructure health check passed'
          echo '✅ Deployment verification completed'
        working-directory: ./terraform
      - name: Application Rollout with Resource Limits
        run: |2-

                          kubectl apply -f ./k8s/resource-quotas/
                          kubectl rollout restart deployment/app-v1
                          kubectl wait --for=condition=available --timeout=300s deployment/app-v1
                        
      - name: Post-Deploy Cost Validation
        run: |-
          sleep 30
          python ./scripts/validate-deployment-cost.py --threshold=$${{ vars.COST_THRESHOLD || 100 }}
      - name: Send Success Notification to eTriage
        if: success()
        run: |-
          WEBHOOK_URL="${{ vars.ETRIAGE_WEBHOOK_URL || secrets.ETRIAGE_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then echo "ETRIAGE_WEBHOOK_URL not set - skipping"; exit 0; fi
          curl -f -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"pipeline_id":"${{ github.run_id }}","job_id":"deploy","status":"success","source":"github_actions","logs":"Deployment completed successfully"}' \
            || echo 'Webhook notification failed - continuing...'
      - name: Send Failure Notification to eTriage
        if: failure()
        run: |-
          WEBHOOK_URL="${{ vars.ETRIAGE_WEBHOOK_URL || secrets.ETRIAGE_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then echo "ETRIAGE_WEBHOOK_URL not set - skipping"; exit 0; fi
          curl -f -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"pipeline_id":"${{ github.run_id }}","job_id":"deploy","error_type":"deploy_failure","status":"failure","source":"github_actions","logs":"${{ toJSON(job) }}"}' \
            || echo 'Webhook notification failed - check eTriage server status'
  hibernation-scheduler:
    runs-on: ubuntu-latest
    if: ${{ github.event.schedule && vars.HIBERNATION_ENABLED == 'true' }}
    needs:
      - deploy
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Refresh EKS Context & Setup Cost Monitoring
        run: |-
          aws eks update-kubeconfig --name $${{ secrets.EKS_CLUSTER_NAME }}
          kubectl apply -f ./k8s/cost-monitoring/
      - name: Execute Hibernation Schedule
        run: |2-

                          kubectl scale deployment --replicas=0 --all -n default
                          python ./scripts/hibernate-resources.py --cloud=aws
                        
