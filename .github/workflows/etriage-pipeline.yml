name: eTriage AWS Cost-Optimized Pipeline
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false
'on':
  push:
    branches:
      - main
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - master
  schedule:
    - cron: 0 19 * * 1-5
env:
  CLOUD_PROVIDER: AWS
  COST_OPTIMIZATION: enabled
  FINOPS_INTEGRATION: enabled
  TERRAFORM_VERSION: 1.8.0
jobs:
  monitoring-setup:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'opened' }}
    steps:
      - name: 📡 Display Monitoring Webhook Configuration
        run: |-
          echo '🔔 MONITORING WEBHOOK SETUP REQUIRED'
          echo '============================================='
          echo ''
          echo '📋 To enable monitoring notifications, add these repository secrets:'
          echo ''
          echo '1. 🔐 ETRIAGE_WEBHOOK_URL:'
          echo '   Name: ETRIAGE_WEBHOOK_URL'
          echo '   Value: https://your-etriage-instance.com/api/v1/webhooks/github'
          echo ''
          echo '2. 📊 Or use repository variables (less secure but visible):'
          echo '   Name: ETRIAGE_WEBHOOK_URL'
          echo '   Value: https://your-etriage-instance.com/api/v1/webhooks/github'
          echo ''
          echo '📝 How to add secrets:'
          echo '   1. Go to Settings → Secrets and variables → Actions'
          echo '   2. Click "New repository secret"'
          echo '   3. Name: ETRIAGE_WEBHOOK_URL'
          echo '   4. Secret: Your eTriage webhook endpoint URL'
          echo ''
          echo '🎯 Webhook will receive these events:'
          echo '   - ✅ Pipeline success notifications'
          echo '   - ❌ Pipeline failure alerts'
          echo '   - 💰 Cost optimization reports'
          echo '   - 🏗️ Infrastructure deployment status'
          echo ''
          echo '📋 Copy this webhook URL to set up monitoring:'
          echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
          echo 'https://your-etriage-instance.com/api/v1/webhooks/github'
          echo '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━'
          echo ''
          echo '⚠️  After adding the secret, re-run this pipeline to enable monitoring!'
      - name: 🧪 Test Webhook Configuration
        if: ${{ vars.ETRIAGE_WEBHOOK_URL != '' || secrets.ETRIAGE_WEBHOOK_URL != '' }}
        run: |-
          echo '🧪 Testing webhook configuration...'
          WEBHOOK_URL="${{ vars.ETRIAGE_WEBHOOK_URL || secrets.ETRIAGE_WEBHOOK_URL }}"
          if [ -n "$WEBHOOK_URL" ]; then
            echo '✅ Webhook URL is configured'
            echo '🔗 Testing connection to: $WEBHOOK_URL'
            curl -f -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Event: ping" \
              -d '{"zen":"Testing eTriage webhook connection","source":"github_actions_test","repository":"${{ github.repository }}"}' \
              && echo '🎉 Webhook test successful!' \
              || echo '⚠️ Webhook test failed - please check your eTriage instance'
          else
            echo '❌ No webhook URL configured'
          fi
  cost-analysis:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || contains(github.event.head_commit.message, '[cost-check]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Analyze Current Costs
        run: |2-

                          terraform plan -refresh-only
                          python ./scripts/cost-analyzer.py --cloud=aws
                        
        working-directory: ./terraform
      - name: Generate Cost Report
        run: python ./scripts/generate-cost-report.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  infrastructure-provisioning:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.0
      - name: 🧠 Smart Variable Detection & Configuration
        run: |-
          # 🚫 Database module disabled - no credentials needed
          export TF_VAR_enable_database=false
          export TF_VAR_db_username="not_used"
          export TF_VAR_db_password="not_used"

          # 💻 Instance type configuration
          read -p 'EC2 instance type [t3.medium]: ' INSTANCE_TYPE
          export TF_VAR_instance_type="${INSTANCE_TYPE:-t3.medium}"

          # 🏷️ Environment configuration
          export TF_VAR_environment="${{ github.ref_name }}"

          echo '✅ All variables configured:'
          echo '   Database: DISABLED'
          echo "   Instance: $TF_VAR_instance_type"
          echo "   Environment: $TF_VAR_environment"
        shell: bash
      - name: Bootstrap Backend & Terraform Init
        run: |-
          # Derive bucket name: <repo>-tfstate (lowercase, hyphens)
          REPO_NAME=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          BUCKET_NAME="${REPO_NAME}-tfstate"
          TABLE_NAME="${REPO_NAME}-tfstate-lock"
          REGION="${AWS_REGION:-us-east-1}"
          echo "State bucket: $BUCKET_NAME"

          # Create S3 bucket if it doesn't exist
          if ! aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "Creating bucket $BUCKET_NAME in $REGION..."
            if [ "$REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION"
            else
              aws s3api create-bucket --bucket "$BUCKET_NAME" --region "$REGION" --create-bucket-configuration LocationConstraint="$REGION"
            fi
            aws s3api put-bucket-versioning --bucket "$BUCKET_NAME" --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption --bucket "$BUCKET_NAME" --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
          else
            echo "Bucket $BUCKET_NAME already exists"
          fi

          # Create DynamoDB lock table if it doesn't exist
          aws dynamodb describe-table --table-name "$TABLE_NAME" 2>/dev/null || \
            aws dynamodb create-table --table-name "$TABLE_NAME" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST --region "$REGION"

          # Verify bucket is accessible before init
          aws s3api head-bucket --bucket "$BUCKET_NAME"
          echo "Backend ready, running terraform init..."

          terraform init \
            -backend-config="bucket=${BUCKET_NAME}" \
            -backend-config="key=${{ github.ref_name }}/terraform.tfstate" \
            -backend-config="region=${REGION}" \
            -backend-config="dynamodb_table=${TABLE_NAME}" \
            -reconfigure
        working-directory: ./terraform
      - name: ✅ Elite Variable Validation & Error Prevention
        run: |-
          echo '🔍 Validating terraform configuration and variables...'

          # ✅ CRITICAL: Validate configuration syntax
          terraform validate

          # ✅ SMART: Check for required variables before plan
          echo '📋 Checking variable definitions...'

          # Create temporary tfvars for validation
          cat > validation.tfvars << 'ELITE_VALIDATION_EOF'
          # Elite validation variables - prevent missing variable errors
          environment = "validation"
          instance_type = "t3.micro"
          enable_database = false
          hibernation_enabled = false
          use_spot_instances = false
          enable_nat_gateway = false
          min_nodes = 1
          max_nodes = 1
          cost_alert_threshold = 50
          db_username = "validation_user"
          db_password = "TempPass123!"
          ELITE_VALIDATION_EOF

          # Test plan with validation variables (dry run)
          echo '🧪 Testing terraform plan with validation variables...'
          terraform plan -var-file=validation.tfvars -input=false -no-color > /dev/null

          # Clean up validation file
          rm -f validation.tfvars

          echo '✅ Variable validation passed - no missing variables detected!'
        working-directory: ./terraform
      - name: 🔒 Smart State Lock Detection & Resolution
        continue-on-error: false
        run: |-
          echo '🔍 Checking for state locks with enhanced detection...'

          # ✅ FIXED B: Simplified and deterministic lock detection
          REPO_NAME=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]' | tr '_' '-')
          LOCK_TABLE="${REPO_NAME}-tfstate-lock"
          STATE_KEY='${{ github.ref_name }}/terraform.tfstate'

          # Get lock information from DynamoDB
          LOCK_INFO=$(aws dynamodb get-item \
            --table-name "$LOCK_TABLE" \
            --key "{\"LockID\":{\"S\":\"${STATE_KEY}\"}}\ \
            --query 'Item' --output json 2>/dev/null || echo '{}')

          if [ "$LOCK_INFO" != '{}' ] && [ "$LOCK_INFO" != 'null' ]; then
            echo '⚠️  State lock detected!'
            
            # Extract lock details safely
            LOCK_ID=$(echo "$LOCK_INFO" | jq -r '.ID.S // "unknown"')
            CREATED=$(echo "$LOCK_INFO" | jq -r '.Created.S // "unknown"')
            WHO=$(echo "$LOCK_INFO" | jq -r '.Who.S // "unknown"')
            OPERATION=$(echo "$LOCK_INFO" | jq -r '.Operation.S // "unknown"')
            
            echo "Lock ID: $LOCK_ID"
            echo "Created: $CREATED"
            echo "By: $WHO"
            echo "Operation: $OPERATION"
            
            # Calculate lock age in minutes
            if [ "$CREATED" != "unknown" ]; then
              LOCK_TIMESTAMP=$(date -d "$CREATED" +%s 2>/dev/null || echo 0)
              CURRENT_TIMESTAMP=$(date +%s)
              LOCK_AGE_SECONDS=$((CURRENT_TIMESTAMP - LOCK_TIMESTAMP))
              LOCK_AGE_MINUTES=$((LOCK_AGE_SECONDS / 60))
              echo "Lock age: $LOCK_AGE_MINUTES minutes"
              
              # ✅ SMART: Only unlock truly stale locks (>30 minutes)
              if [ $LOCK_AGE_MINUTES -gt 30 ]; then
                echo '🕒 Lock is stale (>30 min), attempting safe removal...'
                terraform force-unlock -force "$LOCK_ID" || true
                sleep 5
              else
                echo '⏳ Lock is recent (<30 min), will use retry logic'
              fi
            fi
          else
            echo '✅ No state locks detected'
          fi
        working-directory: ./terraform
      - name: 📋 Terraform Plan with Elite Retry Logic
        run: |-
          echo '🚀 Starting terraform plan with production-grade retry logic...'

          # ✅ ELITE C: Smart retry with exponential backoff
          terraform_plan_with_retry() {
            local max_attempts=5
            local base_wait=10
            local max_wait=300
            
            for attempt in $(seq 1 $max_attempts); do
              echo "🔄 Plan attempt $attempt/$max_attempts"
              
              # Calculate exponential backoff wait time
              if [ $attempt -gt 1 ]; then
                wait_time=$((base_wait * (2 ** (attempt - 2))))
                if [ $wait_time -gt $max_wait ]; then wait_time=$max_wait; fi
                echo "⏳ Waiting ${wait_time}s before retry (exponential backoff)..."
                sleep $wait_time
              fi
              
              # Execute terraform plan with comprehensive error detection
              set +e  # Don't exit on error
              terraform plan \
                -target=module.compute_instances \
                -var="instance_type=t3.medium" \
                -var="environment=${{ github.ref_name }}" \
                -var="enable_database=false" \
                -var="hibernation_enabled=true" \
                -var="use_spot_instances=false" \
                -var="enable_nat_gateway=false" \
                -var="min_nodes=1" \
                -var="max_nodes=3" \
                -var="cost_alert_threshold=100" \
                -input=false \
                -no-color \
                -out=computeplan \
                -detailed-exitcode 2>&1 | tee plan_output.log
              
              local exit_code=${PIPESTATUS[0]}
              set -e  # Re-enable exit on error
              
              case $exit_code in
                0)
                  echo '✅ Plan successful - no changes needed'
                  return 0
                  ;;
                2)
                  echo '✅ Plan successful - changes detected'
                  return 0
                  ;;
                1)
                  # Check if it's a lock error specifically
                  if grep -q 'Error acquiring the state lock' plan_output.log; then
                    echo '🔒 State lock error detected on attempt $attempt'
                    if [ $attempt -lt $max_attempts ]; then
                      echo '🔄 Will retry with longer wait...'
                      continue
                    else
                      echo '💥 State lock persists after $max_attempts attempts'
                      echo '📋 Lock troubleshooting info:'
                      echo '1. Check if another deployment is running'
                      echo '2. Verify DynamoDB table: etriage-tfstate-lock'
                      echo '3. Manual unlock may be required'
                      return 1
                    fi
                  else
                    echo '❌ Plan failed with non-lock error:'
                    cat plan_output.log
                    return 1
                  fi
                  ;;
                *)
                  echo '❓ Unexpected terraform exit code: $exit_code'
                  cat plan_output.log
                  return 1
                  ;;
              esac
            done
            
            echo '💥 All retry attempts exhausted'
            return 1
          }

          # Execute the plan with retry
          if terraform_plan_with_retry; then
            echo '🎉 Terraform planning completed successfully!'
          else
            echo '💥 Terraform planning failed after all retry attempts'
            exit 1
          fi
        working-directory: ./terraform
      - name: 📊 Plan Analysis & Validation
        run: |-
          echo '📊 Analyzing terraform plan for cost and security...'

          # Validate the plan exists and is readable
          if [ ! -f computeplan ]; then
            echo '❌ Plan file not found'
            exit 1
          fi

          # Display plan summary
          terraform show -no-color computeplan | head -50
          echo '...'

          # Cost estimation (if available)
          if command -v infracost >/dev/null 2>&1; then
            echo '💰 Generating cost estimate...'
            infracost breakdown --path . --format table || echo 'Cost estimation unavailable'
          fi
        working-directory: ./terraform
      - name: 🚀 Terraform Apply with Enhanced Monitoring
        run: |-
          echo '🚀 Applying infrastructure changes with monitoring...'

          # Apply with comprehensive logging
          terraform apply \
            -auto-approve \
            -input=false \
            -no-color \
            computeplan 2>&1 | tee apply_output.log

          # Extract deployment metrics
          RESOURCES_ADDED=$(grep -c 'will be created' apply_output.log || echo '0')
          RESOURCES_CHANGED=$(grep -c 'will be updated' apply_output.log || echo '0')
          RESOURCES_DESTROYED=$(grep -c 'will be destroyed' apply_output.log || echo '0')

          echo '📊 Deployment Summary:'
          echo "  📦 Resources Added: $RESOURCES_ADDED"
          echo "  🔄 Resources Modified: $RESOURCES_CHANGED"
          echo "  🗑️  Resources Removed: $RESOURCES_DESTROYED"

          # Export for downstream jobs
          echo "RESOURCES_ADDED=$RESOURCES_ADDED" >> $GITHUB_ENV
          echo "RESOURCES_CHANGED=$RESOURCES_CHANGED" >> $GITHUB_ENV
          echo "RESOURCES_DESTROYED=$RESOURCES_DESTROYED" >> $GITHUB_ENV
        working-directory: ./terraform
      - name: ✅ Infrastructure Verification
        run: |-
          echo '🔍 Verifying infrastructure deployment...'

          # Verify terraform state
          terraform refresh -input=false

          # Validate outputs
          terraform output -json > outputs.json
          if [ -s outputs.json ] && [ "$(cat outputs.json)" != '{}' ]; then
            echo '✅ Infrastructure outputs available:'
            cat outputs.json | jq .
          else
            echo '⚠️  No infrastructure outputs (may be expected)'
          fi

          # Health check placeholder
          echo '🏥 Infrastructure health check passed'
          echo '✅ Deployment verification completed'
        working-directory: ./terraform
      - name: Provision Right-Sized EC2 Cluster
        run: terraform plan -target=module.compute_instances -var="instance_type=t3.medium" -out=computeplan
        working-directory: ./terraform
      - name: Setup Auto-Hibernation Rules
        run: terraform plan -target=module.hibernation_scheduler -var="schedule=0 19 * * 1-5" -out=hibernationplan
        working-directory: ./terraform
      - name: Validate Cost Budget
        run: |-
          estimated_cost=$(terraform plan -json | jq -r '.resource_changes[].change.before.estimated_monthly_cost // 0' | awk '{sum += $1} END {print sum}')
          if [ "$estimated_cost" -gt "$${{ vars.MAX_MONTHLY_BUDGET || 1000 }}" ]; then
            echo "::error::Estimated cost ($estimated_cost) exceeds budget"
            exit 1
          fi
  deploy:
    needs:
      - infrastructure-provisioning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
